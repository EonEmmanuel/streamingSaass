services:
  srs:
    image: ossrs/srs:5
    container_name: srs
    restart: always
    ports:
      - "1935:1935"
      - "8000:8000"
      - "1985:1985"
      - "9000:9000/udp"
      - "9001:9001/udp" # SRT playback port
    volumes:
      - ./srs.dev.conf:/usr/local/srs/conf/srs.conf
      - ./media:/usr/local/srs/objs/nginx/html/media
    extra_hosts:
      - "host.docker.internal:host-gateway" # allows SRS to reach your Node.js API
    command: ["./objs/srs", "-c", "conf/srs.conf"]
