listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;

http_api {
    enabled         on;
    listen          1985;
}

http_server {
    enabled         on;
    listen          8000;
    dir             /usr/local/srs/objs/nginx/html/media;
}

stats {
    network         0;
}

####################################################
# SRT GLOBAL SERVER (REQUIRED)
####################################################
srt_server {
    enabled         on;
    listen          9000;
    maxbw           -1;
    latency         1000;
    connect_timeout 4000;
    peerlatency     1000;
    recvlatency     1000;
}

####################################################
# DEFAULT VHOST
####################################################
vhost __defaultVhost__ {

    ################################################
    # 🔥 CRITICAL FIX: ENABLE SRT PER VHOST
    ################################################
    srt {
        enabled on;
    }

    http_hooks {
        enabled         on;
        on_publish      http://host.docker.internal:4000/api/srs/on_publish;
        on_unpublish    http://host.docker.internal:4000/api/srs/on_unpublish;
        on_hls          http://host.docker.internal:4000/api/srs/on_hls;
    }

    ################################################
    # HLS (WEB PLAYBACK)
    ################################################
    hls {
        enabled             on;
        hls_path            /usr/local/srs/objs/nginx/html/media;
        hls_fragment        4;
        hls_window          20;
        hls_cleanup         on;
        hls_dispose         30;
        hls_wait_keyframe   on;

        hls_m3u8_file       [app]/[stream]/index.m3u8;
        hls_ts_file         [app]/[stream]/[seq].ts;
    }

    ################################################
    # DISABLED FOR TESTING
    ################################################
    dvr {
        enabled off;
    }

    transcode {
        enabled off;
    }
}